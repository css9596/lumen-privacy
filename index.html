<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumen — 삶의 라이프 인텔리전스</title>
  <style>
    :root {
      --primary: #6C63FF;
      --teal: #3ECFCF;
      --text: #1A1A2E;
      --sub: #555570;
      --bg: #F5F5FF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .logo-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary), var(--teal));
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 20px;
    }
    h1 {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--primary), var(--teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }
    .tagline {
      font-size: 16px;
      color: var(--sub);
      line-height: 1.7;
      max-width: 340px;
      margin: 0 auto 40px;
    }
    .badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary), var(--teal));
      color: white;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 50px;
      text-decoration: none;
      margin-bottom: 48px;
    }
    footer {
      font-size: 13px;
      color: #aaa;
    }
    footer a {
      color: var(--primary);
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="logo-icon">🌟</div>
  <h1>Lumen</h1>
  <p class="tagline">당신 삶의 모든 신호를 읽고,<br>매일 아침 가장 중요한 것을 알려드려요.</p>
  <a class="badge" href="https://play.google.com/store/apps/details?id=com.sungsik.lumen">Google Play에서 다운로드</a>
  <footer>
    <a href="privacy.html">개인정보처리방침</a>
  </footer>
</body>
</html>
